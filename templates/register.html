{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center py-5" style="min-height: 100vh;">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 450px; border-radius: 15px; border: none;">
        
        <h3 class="text-center mb-4 fw-bold text-body-emphasis">Student Data Manager</h3>
        
        <div class="text-center mb-4">
            <span class="badge bg-light text-dark fs-5 px-4 py-2 border">Реєстрація</span>
        </div>

        <form method="post">

            
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold mb-1">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold mt-3" style="background-color: #2e69ff; border: none;">
                Зареєструватися
            </button>
        </form>

        <div class="text-center mt-4">
            <small class="text-muted">Вже маєте акаунт? <a href="{{ url_for('login') }}" class="text-decoration-none">Увійти</a></small>
        </div>
    </div>
</div>
{% endblock %}
