<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data Manager</title>
    <script>
        const getStoredTheme = () => localStorage.getItem('theme') || 'light';
        const setTheme = theme => document.documentElement.setAttribute('data-bs-theme', theme);
        setTheme(getStoredTheme());
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
            /* Запобігання горизонтальній прокрутці */
        }


        /* Плавна анімацію для трикутників (ефект "дихання") */
        @keyframes pulse {
            0% {
                opacity: 0.00;
                transform: scale(1);
            }

            50% {
                opacity: 0.08;
                transform: scale(1.12);
            }

            100% {
                opacity: 0.00;
                transform: scale(1);
            }
        }

        .dynamic-triangles {
            animation: pulse 8s infinite alternate ease-in-out;
            transform-origin: center;
        }

        /* Адаптивні кольори для бокової панелі та шапки */
        [data-bs-theme="light"] {
            --custom-sidebar-bg: #dadddf;
            --custom-text-color: #1c2833;
            --triangle-stroke: #ffffff;
            --shape-rect: #1c2833;
            /* Темний квадрат вдень */
        }

        [data-bs-theme="dark"] {
            --custom-sidebar-bg: #212529;
            /* Темно-сірий для панелі */
            --custom-text-color: #f8f9fa;
            /* Світлий текст */
            --triangle-stroke: #212529;
            /* Темні лінії між трикутниками */
            --shape-rect: #6c757d;
            /* Світло-сірий квадрат вночі */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
        }

        /*TOGGLE SWITCH*/
        .switch-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .switch-label {
            font-size: 1.1rem;
            font-weight: 500;
            min-width: 35px;
            text-align: right;
        }

        .theme-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            border: 2px solid #666;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: #ccc;
            transition: .3s;
            border-radius: 50%;
        }

        /* Стан коли увімкнено (ON) */
        input:checked+.slider {
            background-color: #2e69ff;
            border-color: #2e69ff;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
            background-color: #fff;
        }
    </style>
</head>

<body style="position: relative; z-index: 1;">
    <button id="themeToggleBtn"
        class="btn btn-outline-secondary position-fixed bottom-0 end-0 m-4 rounded-circle shadow"
        style="z-index: 1050; width: 50px; height: 50px;">
        <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
    </button>

    <svg id="gridSvg"
        style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none;"
        xmlns="http://www.w3.org/2000/svg"></svg>

    <svg viewBox="0 0 1920 1080"
        style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;"
        preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="1000" r="450" fill="#2e69ff" opacity="0.15" />
        <polygon points="1400,0 1920,0 1920,500" fill="#00a8ff" opacity="0.2" />
        <rect x="1100" y="300" width="400" height="400" fill="var(--shape-rect)" opacity="0.08"
            transform="rotate(25 1300 500)" />
        <circle cx="1650" cy="850" r="50" fill="#2e69ff" opacity="0.25" />
    </svg>

    <div style="z-index: 10; position: relative;">
        {% block content %}
    {% endblock %}

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index: 1100">
    </div>

    <!-- Bootstrap Bundle with Popper --><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const svg = document.getElementById("gridSvg");
            const colors = ["#2e69ff", "#00a8ff", "#e6efff", "#cce0ff", "#99c2ff"];

            const dx = 150;
            const dy = 100;

            function generateGrid() {
                // Очищаємо SVG перед перемалюванням
                svg.innerHTML = '';

                const cols = Math.ceil(window.innerWidth / dx) + 1;
                const rows = Math.ceil(window.innerHeight / dy) + 1;

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                // Застосовуємо анімацію "дихання" (8 секунд)
                g.classList.add("dynamic-triangles");

                for (let i = 0; i < rows; i++) {
                    for (let j = 0; j < cols; j++) {

                        // Експеримент: З імовірністю 50% ми пропускаємо цей трикутник.
                        // Таким чином на екрані малюється лише 50% фігур у випадкових місцях.
                        if (Math.random() > 0.5) continue;

                        const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                        let p0x, p0y, p1x, p1y, p2x, p2y;

                        if ((i + j) % 2 === 0) {
                            p0x = j * dx; p0y = i * dy;
                            p1x = (j + 1) * dx; p1y = (i + 1) * dy;
                            p2x = (j + 1) * dx; p2y = (i - 1) * dy;
                        } else {
                            p0x = (j + 1) * dx; p0y = i * dy;
                            p1x = j * dx; p1y = (i - 1) * dy;
                            p2x = j * dx; p2y = (i + 1) * dy;
                        }

                        polygon.setAttribute("points", `${p0x},${p0y} ${p1x},${p1y} ${p2x},${p2y}`);

                        const randomColor = colors[Math.floor(Math.random() * colors.length)];
                        polygon.setAttribute("fill", randomColor);
                        polygon.setAttribute("stroke", "var(--triangle-stroke)");
                        polygon.setAttribute("stroke-width", "0.5");

                        g.appendChild(polygon);
                    }
                }
                svg.appendChild(g);
            }

            // Генеруємо сітку при першому завантаженні
            generateGrid();

            // Перемальовуємо при зміні розміру вікна
            window.addEventListener('resize', () => {
                clearTimeout(window.resizeTimer);
                window.resizeTimer = setTimeout(generateGrid, 200);
            });

            // Експеримент: Перегенеруємо сітку кожні 8 секунд (8000 мс)
            // Цей час ідеально збігається з "провалом" прозорості в нашій CSS-анімації
            setInterval(generateGrid, 8000);
        });
    </script>
    <script>
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            document.documentElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);

            // Змінюємо іконку на кнопці
            const icon = document.getElementById('themeIcon');
            if (newTheme === 'dark') {
                icon.className = 'bi bi-sun-fill';
            } else {
                icon.className = 'bi bi-moon-stars-fill';
            }
        });

        // Встановлюємо правильну іконку при завантаженні
        if (getStoredTheme() === 'dark') {
            document.getElementById('themeIcon').className = 'bi bi-sun-fill';
        }
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (typeof io !== 'undefined') {
                var socket = io.connect(location.protocol + '//' + document.domain + ':' + location.port);
                
                socket.on('sensor_update', function(msg) {
                    const sensor = msg.sensor;
                    const value = msg.value;
                    
                    // Simple value update (for spans that just hold the number)
                    const valElement = document.getElementById('val-' + sensor);
                    if (valElement) {
                        valElement.innerText = value;
                    }
                    
                    // Specific complex updates
                    if (sensor === 'power') {
                        const el = document.getElementById('val-power-text');
                        if (el) {
                            if (el.dataset.view === 'admin' || el.dataset.view === 'user') {
                                el.innerText = value === 'online' ? 'Мережа 220V' : 'БЛЕКАУТ';
                            }
                            el.className = value === 'online' ? 'fw-bold text-success' : 'fw-bold text-danger';
                        }
                        const badge = document.getElementById('badge-power');
                        if (badge) {
                            badge.innerText = value === 'online' ? 'АКТИВНА' : 'БЛЕКАУТ';
                            badge.className = value === 'online' ? 'badge fs-6 px-3 py-2 bg-success' : 'badge fs-6 px-3 py-2 bg-danger';
                        }
                    }
                    
                    if (sensor === 'door') {
                        const textEls = document.querySelectorAll('.val-door-text');
                        textEls.forEach(el => {
                            el.innerText = value === 'OPEN' ? 'ВІДЧИНЕНІ' : 'ЗАЧИНЕНІ';
                            el.classList.remove('text-danger', 'text-success');
                            el.classList.add(value === 'OPEN' ? 'text-danger' : 'text-success');
                        });
                        const badge = document.getElementById('badge-door');
                        if (badge) {
                            badge.innerText = value;
                            badge.className = value === 'OPEN' ? 'badge bg-danger' : 'badge bg-secondary';
                        }
                    }
                    
                    if (sensor === 'motion') {
                        const textEls = document.querySelectorAll('.val-motion-text');
                        textEls.forEach(el => {
                            el.innerText = value === 'ON' ? 'Є РУХ' : 'ТИША';
                            el.classList.remove('text-warning', 'text-success');
                            el.classList.add(value === 'ON' ? 'text-warning' : 'text-success');
                        });
                        const badge = document.getElementById('badge-motion');
                        if (badge) {
                            badge.innerText = value;
                            badge.className = value === 'ON' ? 'badge bg-warning text-dark' : 'badge bg-secondary';
                        }
                    }

                    if (sensor === 'security_mode') {
                        const statusHeader = document.getElementById('security-status');
                        if (statusHeader) {
                            const view = statusHeader.dataset.view;
                            if (view === 'admin') {
                                statusHeader.innerText = value === 'ARM' ? 'ПІД ОХОРОНОЮ' : 'ЗНЯТО З ОХОРОНИ';
                                statusHeader.className = value === 'ARM' ? 'fw-bold text-warning' : 'fw-bold text-success';
                            } else if (view === 'user') {
                                statusHeader.innerText = value === 'ARM' ? 'АКТИВНА' : 'ВИМКНЕНА';
                                statusHeader.className = value === 'ARM' ? 'fw-bold text-warning' : 'fw-bold text-secondary';
                            } else if (view === 'guest') {
                                statusHeader.innerText = value === 'ARM' ? 'РЕЖИМ ОХОРОНИ' : 'БЕЗ ОХОРОНИ';
                                statusHeader.className = value === 'ARM' ? 'fw-bold m-0 text-warning' : 'fw-bold m-0 text-secondary';
                            }
                        }
                    }

                    if (sensor === 'gas') {
                        const el = document.getElementById('val-gas');
                        if (el) {
                            el.innerText = value + ' PPM';
                            el.className = parseInt(value) > 2200 ? 'fw-bold text-danger' : 'fw-bold text-success';
                        }
                        const textEl = document.getElementById('val-gas-text');
                        if (textEl) {
                            textEl.innerText = parseInt(value) > 2200 ? 'Перевищення норми диму!' : 'Рівень газу в нормі';
                        }
                    }

                    if (sensor === 'soil') {
                        const badge = document.getElementById('badge-soil');
                        if (badge) {
                            badge.innerText = parseInt(value) > 2500 ? 'Сухо' : 'Зволожено';
                            badge.className = parseInt(value) > 2500 ? 'badge bg-danger' : 'badge bg-info';
                        }
                        const textEl = document.getElementById('val-soil-text');
                        if (textEl) {
                            textEl.innerText = parseInt(value) > 2500 ? '(Сухо)' : '(ОК)';
                        }
                        const iconEl = document.getElementById('val-soil');
                        if(iconEl && iconEl.classList.contains('fs-4')) {
                            iconEl.classList.remove('text-danger', 'text-primary');
                            iconEl.classList.add(parseInt(value) > 2500 ? 'text-danger' : 'text-primary');
                        }
                    }
                    
                    // Toggle switches states (room1, room2, pump) from hardware feedback
                    if (sensor === 'room1_status' || sensor === 'room2_status' || sensor === 'pump_status') {
                        const device = sensor.replace('_status', '');
                        const toggleAdmin = document.getElementById('switch-' + device);
                        const toggleUser = document.getElementById('switch-' + device + '-u');
                        const labelAdmin = document.getElementById('lbl-' + device);
                        const labelUser = document.getElementById('lbl-' + device + '-u');
                        
                        const isOn = value === 'ON';
                        
                        if (toggleAdmin) toggleAdmin.checked = isOn;
                        if (toggleUser) toggleUser.checked = isOn;
                        if (labelAdmin) labelAdmin.innerText = isOn ? 'On' : 'Off';
                        if (labelUser) labelUser.innerText = isOn ? 'On' : 'Off';
                    }
                    
                    // Alert logic
                    if (sensor === 'motion' && isOn) {
                        showToast('<i class="bi bi-person-walking me-2"></i> Виявлено рух в холі!', 'warning text-dark');
                    } else if (sensor === 'door' && isOn) {
                        showToast('<i class="bi bi-door-open me-2"></i> Вхідні двері ВІДЧИНЕНО!', 'danger');
                    } else if (sensor === 'alarm' && isOn) {
                        showToast('<i class="bi bi-shield-slash me-2"></i> СПРАЦЮВАЛА СИГНАЛІЗАЦІЯ!', 'danger text-white');
                    }
                    
                    // Dispatch custom event for child pages (like charts)
                    document.dispatchEvent(new CustomEvent('sensor_data_received', { detail: msg }));
                });
            }
        });

        // Global Toast Function
        function showToast(message, type = 'primary') {
            const container = document.getElementById('toastContainer');
            const toastId = 'toast-' + Date.now();
            
            const btnClass = type.includes('warning') || type.includes('light') ? 'btn-close' : 'btn-close btn-close-white';
            
            const toastHtml = `
                <div id="${toastId}" class="toast align-items-center text-bg-${type} border-0 mb-2 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body fw-medium fs-6">
                            ${message}
                        </div>
                        <button type="button" class="${btnClass} me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', toastHtml);
            const toastElement = document.getElementById(toastId);
            const toast = new bootstrap.Toast(toastElement, { delay: 5000 });
            toast.show();
            
            toastElement.addEventListener('hidden.bs.toast', () => {
                toastElement.remove();
            });
        }
    </script>
</body>

</html>
